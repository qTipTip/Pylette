permissions:
  contents: read
name: Run automated tests

on:
  push

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
        # see details (matrix, python-version, python-version-file, etc.)
        # https://github.com/actions/setup-python
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/cache@v6
        name: Define a cache for the virtual environment based on the dependencies lock file
        with:
          path: ./.venv
          key: venv-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
      - name: Install the project dependencies
        run: uv sync --extra dev --python ${{ matrix.python-version }}
      - name: Install pyright
        run: uv tool install pyright
      - name: Run type checking
        run: uv run pyright
      - name: Run the automated tests (for example)
        run: uv run pytest -v

  citation-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Check CITATION.cff version matches pyproject.toml
        run: |
          python - <<'PY'
          import pathlib, re, sys, tomllib
          proj = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          cff = pathlib.Path("CITATION.cff").read_text()
          m = re.search(r'^version:\s*["\']?([^"\'\s]+)', cff, re.MULTILINE)
          if m is None:
              sys.exit("Could not find 'version:' in CITATION.cff")
          if proj != m.group(1):
              sys.exit(f"Version mismatch: pyproject.toml={proj} but CITATION.cff={m.group(1)}")
          print(f"OK: versions match ({proj})")
          PY

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Create fresh virtual environment for smoke test
        run: uv venv .smoke-test-venv
      - name: Install package in fresh environment
        run: |
          source .smoke-test-venv/bin/activate
          uv sync --frozen --active
      - name: Run smoke test
        run: |
          source .smoke-test-venv/bin/activate
          python smoke_test.py
